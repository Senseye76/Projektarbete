<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/admin_panel_settings_24dp_EA3323_FILL0_wght400_GRAD0_opsz24.png"/>
</head>

<body>
    <header>
        <section class="top-admin">
            <article>
                <h2>Administration</h2>
            </article>

        </section>
    </header>




    <section class="admin-grid">
        <div class="admin-produkt">
            <p>Produkter</p>
        </div>


        <form class="admin-ny-produkt">
            <h3>Ny Produkt</h3>
            <div class="form-info">
                <label for="name">Name</label>
                <input type="text" placeholder="Ange namn" maxlength="50" required>

                <label for="beskrivning">Beskrivning</label>
                <textarea type="text" placeholder="Ange beskrivning" maxlength="200"></textarea>

                <label for="bild">Bild</label>
                <input type="file" accept=".png, .jpg, .jpeg" required>


                <label for="sku">SKU</label>
                <input type="text" id="sku" name="sku" placeholder="Ange SKU" pattern="[A-Za-z]{3}[0-9]{2}"
                    title="SKU måste vara 3 bokstäver följt av 2 siffror (t.ex. AAA11)" required>


                <label for="pris">Pris</label>
                <input type="number" placeholder="Ange pris" required>

                <label for="datum">Publiceringsdatum</label>
                <input type="date">


                <label>Kategorier</label>
                <div class="checkboxes">
                    <label><input type="checkbox"> T-Shirts</label>
                    <label><input type="checkbox"> Sommar</label>
                    <label><input type="checkbox"> Byxor</label>
                    <label><input type="checkbox"> Skor</label>
                </div>


                <button class="add-btn" type="submit">Lägg till</button>


            </div>
        </form>

    </section>
</body>

</html>
