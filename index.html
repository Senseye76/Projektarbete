<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/tshirt.png"/>
    <title>Freaky Fashion</title>
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <img
          src="https://placehold.co/400x100/png?text=Freaky+Fashion"
          alt="Freaky Fashion"
        />
      </div>
      <div class="search">
        <input type="text" placeholder="Sök Produkter..." />
        <button>Sök</button>
      </div>

      <div class="favorite">
        <img src="images/heart.png" alt="Favorit" />
      </div>

      <div class="cart">
        <img src="images/shopping-cart.png" alt="Shopping Cart" />
      </div>

      <nav class="navbar">
        <ul>
          <li><a href="#">Nyheter</a></li>
          <li><a href="#">Bästsäljare</a></li>
          <li><a href="#">Kvinnor</a></li>
          <li><a href="#">Män</a></li>
        </ul>
      </nav>
    </header>
    <main></main>
    <footer></footer>
  </body>
</html>
